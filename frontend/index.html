<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Speed Test</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="container" id="app-container">
            
            <!-- Header Section -->
            <div class="app-header">
                <div class="brand">
                    <span class="brand-dot"></span>
                    <p id="status-text">Ready to connect</p>
                </div>
                <div class="spinner hidden" id="spinner"></div>
            </div>

            <!-- Hero Speedometer Area -->
            <div class="live-area">
                <div class="pulse-ring"></div>
                <div class="speed-display">
                    <h1 id="live-value">0</h1>
                    <span id="live-unit">Mbps</span>
                </div>
            </div>

            <!-- Metrics Matrix Grid -->
            <div class="results-grid">
                <div class="result-box fade-in delay-1">
                    <span class="label">Ping</span>
                    <div class="value-row">
                        <span id="res-ping">--</span>
                        <span class="unit">ms</span>
                    </div>
                </div>
                <div class="result-box fade-in delay-2">
                    <span class="label">Download</span>
                    <div class="value-row">
                        <span id="res-down">--</span>
                        <span class="unit">Mbps</span>
                    </div>
                </div>
                <div class="result-box fade-in delay-3">
                    <span class="label">Upload</span>
                    <div class="value-row">
                        <span id="res-up">--</span>
                        <span class="unit">Mbps</span>
                    </div>
                </div>
            </div>

            <!-- Control Action Center -->
            <div class="controls">
                <div class="unit-toggle">
                    <input type="radio" id="unit-mbps" name="unit" value="mbps" checked>
                    <label for="unit-mbps">Mbps</label>
                    
                    <input type="radio" id="unit-MBps" name="unit" value="MBps">
                    <label for="unit-MBps">MB/s</label>
                </div>
                <button id="start-btn">
                    <span class="btn-text">Start Test</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
            
        </div>
    </div>

    <script src="js/speedtest.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
